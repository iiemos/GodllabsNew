<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    :root {
  --acid: #caff00;
  --acid-dim: rgba(202, 255, 0, 0.1);
  --acid-border: rgba(202, 255, 0, 0.28);
  --plasma: #7b4dff;
  --pink: #ff2d78;
  --teal: #00ffc2;
  --orange: #ff9500;
  --bg: #08080e;
  --surface: #161624;
  --panel: #1e1e30;
  --raised: #27273e;
  --b0: rgba(255, 255, 255, 0.06);
  --b1: rgba(255, 255, 255, 0.13);
  --b2: rgba(255, 255, 255, 0.4);
  --hi: #ffffff;
  --mid: #d4d4e8;
  --lo: #9999bb;
  --faint: #66668a;
  --f-d: "Orbitron", monospace;
  --f-m: "Share Tech Mono", monospace;
  --f-b: "Exo 2", sans-serif;
}
*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
body {
  font-family: var(--f-b);
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  -webkit-font-smoothing: antialiased;
  color: var(--hi);
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0, 0, 0, 0.025) 3px,
    rgba(0, 0, 0, 0.025) 4px
  );
}

.widget {
  width: 680px;
  max-width: 100%;
  background: var(--surface);
  border: 1px solid var(--b1);
  border-radius: 28px;
  padding: 28px;
  box-shadow: 0 24px 64px rgba(0, 0, 0, 0.7);
}

/* header */
.hdr {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 20px;
}
.hdr__left {
  display: flex;
  align-items: center;
  gap: 14px;
}
.token-icon {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  font-size: 18px;
  font-weight: 900;
  flex-shrink: 0;
}
.hdr__sym {
  font-family: var(--f-d);
  font-size: 1.5rem;
  font-weight: 900;
  letter-spacing: -0.01em;
  line-height: 1;
}
.hdr__name {
  font-family: var(--f-m);
  font-size: 0.75rem;
  color: var(--mid);
  margin-top: 4px;
}
.hdr__right {
  text-align: right;
}
.price {
  font-family: var(--f-d);
  font-size: 2rem;
  font-weight: 900;
  letter-spacing: -0.03em;
  line-height: 1;
  transition: color 300ms;
}
.delta {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 8px;
  padding: 4px 10px;
  border-radius: 8px;
  font-family: var(--f-m);
  font-size: 0.8125rem;
  font-weight: 700;
  transition: all 300ms;
}
.delta.up {
  background: var(--acid-dim);
  color: var(--acid);
  border: 1px solid var(--acid-border);
}
.delta.down {
  background: rgba(255, 45, 120, 0.1);
  color: var(--pink);
  border: 1px solid rgba(255, 45, 120, 0.28);
}

/* token tabs */
.token-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.tok-tab {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 14px 7px 10px;
  border-radius: 999px;
  background: var(--panel);
  border: 1px solid var(--b1);
  cursor: pointer;
  transition: all 140ms;
  font-family: var(--f-d);
  font-size: 0.6875rem;
  font-weight: 700;
  color: var(--mid);
  letter-spacing: 0.04em;
}
.tok-tab:hover {
  border-color: var(--b2);
  color: var(--mid);
}
.tok-tab.active {
  background: var(--acid-dim);
  border-color: var(--acid-border);
  color: var(--acid);
}
.tok-tab__icon {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  font-size: 9px;
  font-weight: 900;
}

/* timeframes */
.tf-row {
  display: flex;
  gap: 4px;
  margin-bottom: 18px;
}
.tf {
  padding: 5px 13px;
  border-radius: 999px;
  border: 1px solid transparent;
  font-family: var(--f-m);
  font-size: 0.6875rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  cursor: pointer;
  color: var(--mid);
  background: transparent;
  transition: all 140ms;
}
.tf.active {
  color: var(--acid);
  background: var(--acid-dim);
  border-color: var(--acid-border);
}
.tf:hover:not(.active) {
  color: var(--mid);
}

/* chart */
.chart-wrap {
  height: 200px;
  position: relative;
  margin-bottom: 18px;
  cursor: crosshair;
  overflow: hidden;
  border-radius: 8px;
}
#chartSvg {
  width: 100%;
  height: 100%;
}
.crosshair-line {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 1px;
  background: rgba(255, 255, 255, 0.15);
  pointer-events: none;
  opacity: 0;
  transition: opacity 100ms;
}
.crosshair-dot {
  position: absolute;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--acid);
  border: 2px solid var(--bg);
  pointer-events: none;
  opacity: 0;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 10px rgba(202, 255, 0, 0.6);
  transition: opacity 100ms;
}
.tooltip {
  position: absolute;
  background: var(--panel);
  border: 1px solid var(--b2);
  border-radius: 10px;
  padding: 8px 12px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 100ms;
  white-space: nowrap;
  z-index: 10;
}
.tooltip__price {
  font-family: var(--f-d);
  font-size: 0.8125rem;
  font-weight: 700;
  color: var(--hi);
}
.tooltip__time {
  font-family: var(--f-m);
  font-size: 0.6875rem;
  color: var(--lo);
  margin-top: 3px;
}

/* stats */
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  padding-top: 18px;
  border-top: 1px solid var(--b0);
}
.stat__label {
  font-family: var(--f-m);
  font-size: 0.6875rem;
  color: var(--mid);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 4px;
}
.stat__val {
  font-family: var(--f-m);
  font-size: 0.8125rem;
  font-weight: 700;
  color: var(--mid);
}
.stat__val.up {
  color: var(--acid);
}
.stat__val.down {
  color: var(--pink);
}

/* live dot */
.live-dot {
  display: inline-block;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--teal);
  box-shadow: 0 0 8px rgba(0, 255, 194, 0.7);
  animation: pulse-d 1.8s ease-in-out infinite;
  margin-right: 6px;
  vertical-align: middle;
}
@keyframes pulse-d {
  0%,
  100% {
    opacity: 1;
  }
  50% {
    opacity: 0.3;
  }
}

/* ── PROFILE FOOTER ── */
.profile-footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 14px 24px;
  background: linear-gradient(
    to top,
    rgba(8, 8, 14, 0.98) 0%,
    rgba(8, 8, 14, 0.85) 100%
  );
  backdrop-filter: blur(12px);
  border-top: 1px solid rgba(202, 255, 0, 0.1);
  z-index: 9000;
}
.profile-footer__label {
  font-family: "Share Tech Mono", monospace;
  font-size: 0.6875rem;
  color: #9999bb;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-right: 4px;
}
.profile-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 9px 20px;
  border-radius: 999px;
  font-family: "Orbitron", monospace;
  font-size: 0.6875rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-decoration: none;
  transition: transform 140ms cubic-bezier(0.34, 1.56, 0.64, 1),
    box-shadow 140ms;
  position: relative;
  overflow: hidden;
  white-space: nowrap;
}
.profile-btn::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    180deg,
    rgba(255, 255, 255, 0.1) 0%,
    transparent 55%
  );
  pointer-events: none;
}
.profile-btn:hover {
  transform: translateY(-2px);
}
.profile-btn:active {
  transform: scale(0.97);
}
.profile-btn--codepen {
  background: #caff00;
  color: #08080e;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2);
}
.profile-btn--codepen:hover {
  box-shadow: 0 0 24px rgba(202, 255, 0, 0.55), 0 0 60px rgba(202, 255, 0, 0.15),
    inset 0 1px 0 rgba(255, 255, 255, 0.2);
}
.profile-btn--github {
  background: transparent;
  color: #d4d4e8;
  border: 1px solid rgba(255, 255, 255, 0.24);
}
.profile-btn--github:hover {
  border-color: #caff00;
  color: #caff00;
  box-shadow: 0 0 16px rgba(202, 255, 0, 0.15);
}
.profile-btn__icon {
  font-size: 14px;
  line-height: 1;
}
/* push page content up so footer doesn't overlap */
body {
  padding-bottom: 64px !important;
}

/* ── REACT NOTICE BANNER ── */
.react-notice {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 9001;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  background: #0f0f1a;
  border: 1px solid rgba(123, 77, 255, 0.45);
  border-radius: 16px;
  box-shadow: 0 0 32px rgba(123, 77, 255, 0.18), 0 8px 32px rgba(0, 0, 0, 0.6);
  max-width: 260px;
  animation: notice-in 500ms cubic-bezier(0.34, 1.56, 0.64, 1) both;
  animation-delay: 800ms;
}
@keyframes notice-in {
  from {
    opacity: 0;
    transform: translateX(20px) scale(0.92);
  }
  to {
    opacity: 1;
    transform: translateX(0) scale(1);
  }
}
.react-notice__icon {
  width: 34px;
  height: 34px;
  flex-shrink: 0;
  border-radius: 10px;
  background: rgba(123, 77, 255, 0.18);
  border: 1px solid rgba(123, 77, 255, 0.4);
  display: grid;
  place-items: center;
  font-size: 16px;
}
.react-notice__body {
  flex: 1;
  min-width: 0;
}
.react-notice__title {
  font-family: "Orbitron", monospace;
  font-size: 0.625rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #b89eff;
  margin-bottom: 5px;
}
.react-notice__text {
  font-family: "Exo 2", sans-serif;
  font-size: 0.8125rem;
  color: #d4d4e8;
  line-height: 1.55;
  margin-bottom: 10px;
}
.react-notice__text strong {
  color: #ffffff;
  font-weight: 700;
}
.react-notice__link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: "Share Tech Mono", monospace;
  font-size: 0.6875rem;
  font-weight: 700;
  color: #caff00;
  text-decoration: none;
  letter-spacing: 0.06em;
  transition: gap 140ms;
}
.react-notice__link:hover {
  gap: 10px;
}
.react-notice__link svg {
  flex-shrink: 0;
}
.react-notice__close {
  position: absolute;
  top: 8px;
  right: 10px;
  background: none;
  border: none;
  cursor: pointer;
  color: #66668a;
  font-size: 11px;
  line-height: 1;
  transition: color 140ms;
  padding: 2px;
}
.react-notice__close:hover {
  color: #d4d4e8;
}

  </style>
</head>

  <script>
    const TOKENS = {
  BTC: {
    name: "Bitcoin",
    icon: "₿",
    bg: "linear-gradient(135deg,#f7931a,#ffc246)",
    price: 71842,
    change: 2.84,
    vol: "$38.2B",
    mcap: "$1.41T",
    seed: 42
  },
  ETH: {
    name: "Ethereum",
    icon: "Ξ",
    bg: "#627eea",
    price: 2321,
    change: 1.12,
    vol: "$14.7B",
    mcap: "$279B",
    seed: 17
  },
  SOL: {
    name: "Solana",
    icon: "◎",
    bg: "#9945ff",
    price: 183.44,
    change: -0.77,
    vol: "$3.8B",
    mcap: "$84.7B",
    seed: 73
  },
  BNB: {
    name: "BNB",
    icon: "⬡",
    bg: "#f0b90b",
    price: 416.2,
    change: 0.54,
    vol: "$1.2B",
    mcap: "$62B",
    seed: 28
  }
};
const TFS = ["1H", "4H", "1D", "1W", "1M"];

let activeTok = "BTC";
let activeTf = "1D";
let livePoints = {};
let animFrame;

/* generate seeded pseudorandom price path */
function seededRng(seed) {
  let s = seed;
  return () => {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}
function genPath(tok, tf) {
  const t = TOKENS[tok];
  const rng = seededRng(t.seed + TFS.indexOf(tf) * 100);
  const n = 80;
  const pts = [];
  let v = t.price * (1 - 0.04 - rng() * 0.04);
  const drift = t.change / 100 / n;
  for (let i = 0; i < n; i++) {
    v += v * drift + v * (rng() - 0.5) * 0.018;
    pts.push(v);
  }
  pts.push(t.price); // end at real price
  return pts;
}

function ptsToSvg(pts, W, H, pad = 12) {
  const mn = Math.min(...pts),
    mx = Math.max(...pts);
  const range = mx - mn || 1;
  return pts.map((p, i) => {
    const x = (i / (pts.length - 1)) * W;
    const y = pad + (1 - (p - mn) / range) * (H - pad * 2);
    return [x, y];
  });
}

function drawChart(tok, tf) {
  const wrap = document.getElementById("chartWrap");
  const W = wrap.offsetWidth || 680,
    H = 200;
  const svg = document.getElementById("chartSvg");
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);

  const pts = genPath(tok, tf);
  livePoints[tok + tf] = pts;
  const coords = ptsToSvg(pts, W, H);
  const t = TOKENS[tok];
  const isUp = t.change >= 0;
  const color = isUp ? "#caff00" : "#ff2d78";
  const gradId = "cg" + tok + tf;

  const d = coords
    .map((c, i) => (i === 0 ? `M${c[0]},${c[1]}` : `L${c[0]},${c[1]}`))
    .join(" ");
  const last = coords[coords.length - 1];

  svg.innerHTML = `
    <defs>
      <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.22"/>
        <stop offset="75%" stop-color="${color}" stop-opacity="0.04"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
      </linearGradient>
      <filter id="glow">
        <feGaussianBlur stdDeviation="2" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <!-- grid -->
    ${[0.25, 0.5, 0.75]
      .map(
        (y) =>
          `<line x1="0" y1="${y * H}" x2="${W}" y2="${
            y * H
          }" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>`
      )
      .join("")}
    <!-- fill -->
    <path d="${d} L${last[0]},${H} L0,${H} Z" fill="url(#${gradId})"/>
    <!-- line -->
    <path d="${d}" fill="none" stroke="${color}" stroke-width="2" opacity="0.9" filter="url(#glow)"/>
    <!-- live dot -->
    <circle cx="${last[0]}" cy="${
    last[1]
  }" r="4" fill="${color}" opacity="0.95"/>
    <circle cx="${last[0]}" cy="${
    last[1]
  }" r="9" fill="none" stroke="${color}" stroke-width="1" opacity="0.3">
      <animate attributeName="r" values="6;12;6" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
  `;

  /* update stored coords for hover */
  svg._coords = coords;
  svg._pts = pts;
}

/* hover interactions */
const wrap = document.getElementById("chartWrap");
wrap.addEventListener("mousemove", function (e) {
  const rect = this.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const W = rect.width;
  const svg = document.getElementById("chartSvg");
  if (!svg._coords) return;
  const coords = svg._coords,
    pts = svg._pts;
  const idx = Math.min(
    Math.round((x / W) * (coords.length - 1)),
    coords.length - 1
  );
  const [cx, cy] = coords[idx];
  const yPx = (cy / 200) * rect.height;

  document.getElementById(
    "crosshairLine"
  ).style.cssText = `left:${x}px;opacity:1`;
  document.getElementById("crosshairDot").style.cssText = `left:${
    (cx / svg.viewBox.baseVal.width) * rect.width
  }px;top:${yPx}px;opacity:1`;

  const tt = document.getElementById("tooltip");
  const tok = TOKENS[activeTok];
  document.getElementById("ttPrice").textContent =
    "$" +
    pts[idx].toLocaleString("en", {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });
  const hoursAgo = Math.round(
    (coords.length - 1 - idx) *
      (activeTf === "1H"
        ? 1 / 60
        : activeTf === "4H"
        ? 4 / 60
        : activeTf === "1D"
        ? 24 / coords.length
        : activeTf === "1W"
        ? 168 / coords.length
        : 720 / coords.length)
  );
  document.getElementById("ttTime").textContent =
    hoursAgo === 0 ? "Now" : hoursAgo + "h ago";

  const ttX = Math.min(x + 14, rect.width - 130);
  tt.style.cssText = `left:${ttX}px;top:${Math.max(yPx - 30, 0)}px;opacity:1`;
});
wrap.addEventListener("mouseleave", () => {
  document.getElementById("crosshairLine").style.opacity = "0";
  document.getElementById("crosshairDot").style.opacity = "0";
  document.getElementById("tooltip").style.opacity = "0";
});

/* token tabs */
function buildTokenTabs() {
  const el = document.getElementById("tokenTabs");
  el.innerHTML = Object.entries(TOKENS)
    .map(
      ([k, t]) => `
    <div class="tok-tab ${k === activeTok ? "active" : ""}" data-tok="${k}">
      <div class="tok-tab__icon" style="background:${
        t.bg.includes("gradient") ? t.bg : t.bg
      };color:#fff;">${t.icon}</div>
      ${k}
    </div>
  `
    )
    .join("");
  el.querySelectorAll(".tok-tab").forEach((tab) => {
    tab.addEventListener("click", function () {
      activeTok = this.dataset.tok;
      updateAll();
    });
  });
}

/* timeframe tabs */
function buildTfTabs() {
  const el = document.getElementById("tfRow");
  el.innerHTML = TFS.map(
    (tf) =>
      `<button class="tf ${
        tf === activeTf ? "active" : ""
      }" data-tf="${tf}">${tf}</button>`
  ).join("");
  el.querySelectorAll(".tf").forEach((btn) => {
    btn.addEventListener("click", function () {
      activeTf = this.dataset.tf;
      updateAll();
    });
  });
}

function updateHeader() {
  const t = TOKENS[activeTok];
  const isUp = t.change >= 0;
  document.getElementById("tokenIcon").textContent = t.icon;
  document.getElementById("tokenIcon").style.background = t.bg;
  document.getElementById("tokenIcon").style.color = "#fff";
  document.getElementById("tokenSym").textContent = activeTok;
  document.getElementById("tokenName").innerHTML =
    t.name + ' <span class="live-dot"></span>Live';
  document.getElementById("priceEl").textContent =
    "$" + t.price.toLocaleString("en", { minimumFractionDigits: 2 });
  document.getElementById("priceEl").style.color = isUp ? "#caff00" : "#ff2d78";
  document.getElementById("deltaEl").textContent =
    (isUp ? "▲ +" : "▼ ") + Math.abs(t.change).toFixed(2) + "%";
  document.getElementById("deltaEl").className =
    "delta " + (isUp ? "up" : "down");

  const pts = genPath(activeTok, activeTf);
  const mn = Math.min(...pts),
    mx = Math.max(...pts);
  document.getElementById("statHigh").textContent =
    "$" + mx.toLocaleString("en", { maximumFractionDigits: 2 });
  document.getElementById("statLow").textContent =
    "$" + mn.toLocaleString("en", { maximumFractionDigits: 2 });
  document.getElementById("statVol").textContent = t.vol;
  document.getElementById("statMcap").textContent = t.mcap;
}

function updateAll() {
  buildTokenTabs();
  buildTfTabs();
  updateHeader();
  drawChart(activeTok, activeTf);
}

/* live price tick */
setInterval(() => {
  const t = TOKENS[activeTok];
  const drift = (Math.random() - 0.49) * t.price * 0.0008;
  t.price = Math.max(t.price + drift, 1);
  updateHeader();

  // extend chart path
  const svg = document.getElementById("chartSvg");
  if (svg._pts) {
    const newPt = t.price;
    const pts = [...svg._pts.slice(1), newPt];
    const W = wrap.offsetWidth || 680;
    const coords = ptsToSvg(pts, W, 200);
    svg._coords = coords;
    svg._pts = pts;
    drawChart(activeTok, activeTf);
  }
}, 2000);

updateAll();
window.addEventListener("resize", () => drawChart(activeTok, activeTf));

  </script>
</body>
</html>
